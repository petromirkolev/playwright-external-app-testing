name: External App Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project:
          - contact-list
          - toolshop

    defaults:
      run:
        working-directory: ./${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: ${{ matrix.project }}/playwright-report/
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.project }}
          path: ${{ matrix.project }}/allure-results/
          retention-days: 30

  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all allure result artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge allure results
        run: |
          mkdir -p merged-allure-results
          find artifacts -type f \( -name "*.json" -o -name "*.txt" -o -name "*.csv" -o -name "*.xml" -o -name "*.png" -o -name "*.jpg" -o -name "*.webp" -o -name "*.attach" -o -name "categories.json" -o -name "environment.properties" -o -name "executor.json" \) \
            -exec cp {} merged-allure-results/ \;

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: merged-allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-history

  deploy:
    if: github.event_name != 'pull_request'
    needs: report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
